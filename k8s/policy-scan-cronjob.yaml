apiVersion: batch/v1
kind: CronJob
metadata:
  name: policy-scan
  namespace: cost-opt
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: policy-engine
              image: ghcr.io/your-org/cost-opt-policy-engine:latest
              envFrom:
                - configMapRef:
                    name: cost-opt-config
