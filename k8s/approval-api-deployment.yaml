apiVersion: apps/v1
kind: Deployment
metadata:
  name: approval-api
  namespace: cost-opt
spec:
  replicas: 2
  selector:
    matchLabels:
      app: approval-api
  template:
    metadata:
      labels:
        app: approval-api
    spec:
      containers:
        - name: approval-api
          image: ghcr.io/your-org/cost-opt-approval-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: cost-opt-config
---
apiVersion: v1
kind: Service
metadata:
  name: approval-api
  namespace: cost-opt
spec:
  selector:
    app: approval-api
  ports:
    - port: 80
      targetPort: 8000
