apiVersion: batch/v1
kind: CronJob
metadata:
  name: remediation-window-processor
  namespace: cost-opt
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: remediation-worker
              image: ghcr.io/your-org/cost-opt-remediation-worker:latest
              envFrom:
                - configMapRef:
                    name: cost-opt-config
