name: ci

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/requirements.txt

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

      - name: Basic Python compile check
        run: python -m compileall services

  build-images:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build policy-engine
        run: docker build -f services/policy-engine/Dockerfile -t cost-opt-policy-engine:${{ github.sha }} .

      - name: Build approval-api
        run: docker build -f services/approval-api/Dockerfile -t cost-opt-approval-api:${{ github.sha }} .

      - name: Build remediation-worker
        run: docker build -f services/remediation-worker/Dockerfile -t cost-opt-remediation-worker:${{ github.sha }} .
